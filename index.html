<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1B8A4E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="بانگ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>کاتەکانی بانگ</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1B8A4E;--green-light:#2ECC71;--green-dark:#0D5C33;
  --white:#fff;--white-dim:rgba(255,255,255,.75);--white-faint:rgba(255,255,255,.45);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Cairo',sans-serif;color:#fff;background:#0a2015}

.bg-mosque{
  position:fixed;inset:0;z-index:0;
  background:
    linear-gradient(180deg,
      rgba(0,0,0,.82) 0%,
      rgba(0,5,2,.5) 25%,
      rgba(0,8,3,.3) 50%,
      rgba(0,0,0,.75) 100%
    ),
    radial-gradient(ellipse at 50% 55%, #0d3d1e 0%, #061a0d 35%, #020a05 70%, #000 100%);
}

.app{position:relative;z-index:10;max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:rgba(10,30,16,.88);padding:10px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0}
.hdr-date{text-align:center;flex:1;line-height:1.4}
.hdr-day{font-size:13px;font-weight:700;color:#fff}
.hdr-hijri{font-family:'Amiri',serif;font-size:13px;color:var(--green-light)}
.hdr-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.hdr-btn:active{background:rgba(255,255,255,.25)}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* TOP ROW: شار چەپ + کاتژمێری شوشەیی ڕاست */
.top-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 4px;gap:10px;flex-shrink:0}
.city-pill{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:30px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);backdrop-filter:blur(8px);font-size:18px;font-weight:700;color:#fff;cursor:pointer;text-shadow:0 1px 4px rgba(0,0,0,.5);flex-shrink:0}
.city-pill:active{background:rgba(255,255,255,.3)}

/* کاتژمێری شوشەیی */
.glass-clock{
  flex:1;
  background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,.06) 100%);
  border:1px solid rgba(255,255,255,.35);
  border-radius:22px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:7px 12px;
  display:flex;flex-direction:row;align-items:center;justify-content:space-between;
  box-shadow:0 4px 24px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.3);
  position:relative;overflow:hidden;
}
.glass-clock::before{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.12),transparent);
  border-radius:22px 22px 0 0;pointer-events:none;
}
.gc-time{
  font-size:28px;font-weight:900;color:#fff;
  letter-spacing:1px;line-height:1;
  text-shadow:0 2px 12px rgba(0,0,0,.4),0 0 20px rgba(46,204,113,.3);
  font-variant-numeric:tabular-nums;
  font-family:'Cairo',sans-serif;
}
.gc-seconds{
  font-size:13px;font-weight:600;color:rgba(255,255,255,.5);
  letter-spacing:1px;
  font-variant-numeric:tabular-nums;
}
.gc-ampm{display:none}
/* دوگمەی ١٢/٢٤ */
.gc-toggle{
  display:flex;flex-direction:column;gap:3px;z-index:2;
}
.gc-btn{
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;
  border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.45);cursor:pointer;font-family:'Cairo',sans-serif;
  transition:all .2s;line-height:1.4;
}
.gc-btn.active{background:rgba(46,204,113,.35);border-color:rgba(46,204,113,.6);color:#fff;}

/* COUNTDOWN */
.cd-wrap{display:flex;align-items:center;gap:8px;padding:4px 16px;flex-shrink:0}
.cd-tag{font-size:11px;color:var(--white-dim);background:rgba(0,0,0,.32);padding:3px 10px;border-radius:20px;backdrop-filter:blur(6px);flex-shrink:0}
.cd-bar{flex:1;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.cd-fill{height:100%;background:linear-gradient(90deg,var(--green-dark),var(--green-light));border-radius:2px;transition:width 1s linear}
.cd-timer{font-size:13px;font-weight:700;color:var(--green-light);background:rgba(0,0,0,.32);padding:3px 10px;border-radius:20px;backdrop-filter:blur(6px);flex-shrink:0;font-variant-numeric:tabular-nums}

/* PRAYER ROWS */
.plist-wrap{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:4px 12px 2px}
.prow{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 10px 14px;border-radius:40px;margin-bottom:5px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(6px);transition:all .2s}
.prow.is-active{background:rgba(30,155,80,.92);border-color:var(--green-light);box-shadow:0 4px 20px rgba(46,204,113,.35)}
.prow.is-passed{opacity:.45}
